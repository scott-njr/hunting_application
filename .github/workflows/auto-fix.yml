name: Auto Fix Issue

on:
  workflow_dispatch:
    inputs:
      issue_id:
        description: 'Issue report ID'
        required: true
      title:
        description: 'Bug title'
        required: true
      description:
        description: 'Bug description'
        required: true
      proposed_fix:
        description: 'AI proposed fix'
        required: true
      admin_notes:
        description: 'Admin notes/instructions'
        required: false
        default: ''
      severity:
        description: 'easy or major'
        required: true
      page_url:
        description: 'Page where bug was found'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  fix-and-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Create fix branch
        run: |
          BRANCH="auto-fix/${{ github.event.inputs.issue_id }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Apply fix with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Fix this bug in the codebase. Only change what is necessary.

            Title: ${{ github.event.inputs.title }}
            Description: ${{ github.event.inputs.description }}
            Page URL: ${{ github.event.inputs.page_url }}

            Proposed fix:
            ${{ github.event.inputs.proposed_fix }}

            Admin notes:
            ${{ github.event.inputs.admin_notes }}

            After applying the fix, run `source ~/.zprofile && npm run build` to verify the build passes.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Run tests
        run: npm test

      - name: Run build
        run: npm run build

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "fix: ${{ github.event.inputs.title }}

          Issue ID: ${{ github.event.inputs.issue_id }}
          Severity: ${{ github.event.inputs.severity }}

          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push origin "$BRANCH"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SEVERITY="${{ github.event.inputs.severity }}"
          TITLE="${{ github.event.inputs.title }}"

          if [ "$SEVERITY" = "easy" ]; then
            LABEL="auto-merge"
          else
            LABEL="needs-review"
          fi

          gh pr create \
            --base dev \
            --title "[${SEVERITY}] Fix: ${TITLE}" \
            --body "$(cat <<'PREOF'
          ## Auto-generated fix

          **Severity:** ${{ github.event.inputs.severity }}
          **Issue ID:** ${{ github.event.inputs.issue_id }}

          ### Description
          ${{ github.event.inputs.description }}

          ### AI Proposed Fix
          ${{ github.event.inputs.proposed_fix }}

          ### Admin Notes
          ${{ github.event.inputs.admin_notes }}

          ---
          *Generated by AI Bug Triage System*
          PREOF
          )" \
            --label "bug,${LABEL}"

      - name: Auto-merge if easy
        if: github.event.inputs.severity == 'easy'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr view --json url -q '.url')
          gh pr merge "$PR_URL" --auto --squash
